events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Cấu hình log định dạng chuẩn
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # Cấu hình Upstream
    upstream backend_servers {
        server backend:8000;
    }

    upstream frontend_servers {
        server frontend:3000;
    }

    # SERVER 1: Chuyển hướng HTTP (cổng 80) -> HTTPS (cổng 443)
    server {
        listen 80;
        server_name localhost;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # SERVER 2: Xử lý kết nối HTTPS bảo mật (cổng 443)
    server {
        listen 443 ssl;
        server_name localhost;

        # Chứng chỉ SSL tự ký cho môi trường localhost
        ssl_certificate     /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Tối ưu hóa bảo mật
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # 1. Định tuyến Next.js Frontend
        location / {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            
            # Hỗ trợ WebSockets (cho hot-reload dev mode)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Forward headers cần thiết
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Định tuyến API Backend FastAPI chung
        location /api {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Tối ưu hóa đặc biệt cho SSE (Server-Sent Events) - Endpoint của AI Chat Tutor
        # Ngăn chặn Nginx cache/buffer các tin nhắn đang stream của AI
        location /api/v1/chat {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cấu hình SSE: Tắt buffer để AI stream từng ký tự phản hồi theo thời gian thực
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            
            # Thiết lập thời gian chờ lâu để tránh đứt kết nối khi AI đang xử lý
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
